<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตำนาน ๔ แผ่นดิน: จิ๊กซอว์กวีเอก</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500;700;800&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #0f0a06; 
            background-image: url('https://www.transparenttextures.com/patterns/old-wall.png');
            color: #fde68a; 
        }
        
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .scan-animation { animation: scan 2s infinite; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .ancient-border {
            border: 2px solid #92400e;
            box-shadow: 0 0 15px rgba(180, 83, 9, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
            background: linear-gradient(145deg, #1f1209 0%, #0f0a06 100%);
        }
        .gold-glow { text-shadow: 0 0 10px rgba(252, 211, 77, 0.8); }

        /* สไตล์สำหรับชิ้นส่วนจิ๊กซอว์ */
        .puzzle-piece {
            background-size: 200% 200%;
            transition: all 0.5s ease;
        }
        .puzzle-locked {
            filter: grayscale(100%) sepia(50%) brightness(0.3) contrast(1.2);
        }
        .puzzle-unlocked {
            filter: none;
            box-shadow: inset 0 0 20px rgba(251, 191, 36, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // ==========================================
        // 🛠️ ตัวแปรระบบ (CONFIG) - แก้ไขพิกัดและรูปภาพที่นี่
        // ==========================================
        const CONFIG = {
            SHEET_ID: "1GgYW-vl7PntfM0wn8HEI4KCDyjFZjIIIUS7b5VegnnY",
            GAS_WEB_APP_URL: "https://script.google.com/macros/s/AKfycbzisMGwU343HkvDF-tXICWq0em18giCCOK4BwbhHe5MmLwtalii05PyB2FLGlzhwawjJA/exec", // ใส่ URL จาก Google Apps Script
            
            // ระยะครอบคลุมพื้นที่กิจกรรม (เมตร)
            ALLOWED_RADIUS_METERS: 15,
            POLL_INTERVAL: 5000,
            
            // ลิงก์รูปภาพท่านสุนทรภู่ที่จะนำมาทำจิ๊กซอว์ (แนะนำให้เป็นรูปสี่เหลี่ยมจัตุรัส)
            PUZZLE_IMAGE_URL: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Sunthorn_Phu.jpg/600px-Sunthorn_Phu.jpg"
        };

        // ข้อมูลฐานและพิกัด GPS
        const ZONES_DATA = [
            { id: 1, name: "อโยธยา", lat: 13.756331, lng: 100.501762, icon: "tent", color: "from-amber-600 to-amber-900", quests: ["แม่ค้าตาถึง", "ค่าน้ำนม", "พ่อค้าหน้าใหม่", "ปริศนาเครื่องเทศ"], bgPos: "0% 0%" },
            { id: 2, name: "กรุงเก่า", lat: 13.756400, lng: 100.501800, icon: "footprints", color: "from-emerald-700 to-emerald-900", quests: ["ทรงตัวโถกแถก", "แม่นยำหนังสติ๊ก", "ขี่ม้าส่งเมือง", "ทรงตัวเดินกะลา"], bgPos: "100% 0%" },
            { id: 3, name: "หอจดหมาย", lat: 13.756500, lng: 100.501900, icon: "book-open", color: "from-blue-700 to-blue-900", quests: ["นักสืบพรรณนา", "ถอดรหัสกวี", "เติมคำสุนทรภู่", "ปริศนาอักษรไขว้"], bgPos: "0% 100%" },
            { id: 4, name: "สำนักช่าง", lat: 13.756600, lng: 100.502000, icon: "pen-tool", color: "from-purple-700 to-purple-900", quests: ["พวงกุญแจฝาน้ำ", "พลาสติกหด", "ลวดกำมะหยี่", "ที่คั่นทำมือ"], bgPos: "100% 100%" }
        ];

        // รายชื่อห้องเรียนทั้งหมด 12 ห้อง
        const ALL_ROOMS = [
            "ม.1/1", "ม.1/2", "ม.2/1", "ม.2/2", 
            "ม.3/1", "ม.3/2", "ม.4/1", "ม.4/2", 
            "ม.5/1", "ม.5/2", "ม.6/1", "ม.6/2"
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('auth');
            
            const [activeZone, setActiveZone] = useState(null);
            const [completedQuests, setCompletedQuests] = useState({});
            
            const [distanceToTarget, setDistanceToTarget] = useState(null);
            const [isInsideZone, setIsInsideZone] = useState(false);
            const [gpsLoading, setGpsLoading] = useState(false);
            const [scanning, setScanning] = useState(false);
            
            // Leaderboard State (สร้างค่าเริ่มต้นให้ทุกห้องเป็น 0)
            const [leaderboard, setLeaderboard] = useState(
                ALL_ROOMS.map(room => ({ class: room, score: 0 }))
            );

            useEffect(() => {
                const savedUser = localStorage.getItem('questUser');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                    setCurrentPage('home');
                }
            }, []);

            useEffect(() => {
                if (currentPage === 'home') {
                    fetchLeaderboardData();
                    const interval = setInterval(fetchLeaderboardData, CONFIG.POLL_INTERVAL);
                    return () => clearInterval(interval);
                }
            }, [currentPage]);

            // ==========================================
            // ดึงข้อมูลจัดอันดับและรวมกับ 12 ห้อง
            // ==========================================
            const fetchLeaderboardData = async () => {
                if (!CONFIG.GAS_WEB_APP_URL) return; // หากไม่มี URL ให้ใช้ค่าเริ่มต้น 0 ทุกห้อง
                
                try {
                    const res = await fetch(CONFIG.GAS_WEB_APP_URL + "?action=leaderboard");
                    const data = await res.json();
                    
                    // แปลงข้อมูลจาก API ให้อยู่ในรูป Object { "ม.1/1": 5, ... }
                    const scoresDict = {};
                    data.forEach(item => { scoresDict[item.class] = item.score; });
                    
                    // นำข้อมูลมาผสานกับ 12 ห้องหลัก และจัดเรียงจากมากไปน้อย
                    const finalLeaderboard = ALL_ROOMS.map(room => ({
                        class: room,
                        score: scoresDict[room] || 0
                    })).sort((a, b) => b.score - a.score);
                    
                    setLeaderboard(finalLeaderboard);
                } catch (e) {
                    console.error("Leaderboard fetch error", e);
                }
            };

            const saveProgressToCloud = async (zoneId, questName) => {
                if (!CONFIG.GAS_WEB_APP_URL || !user) return;
                try {
                    fetch(CONFIG.GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "save",
                            name: user.name,
                            grade: user.grade,
                            room: user.room,
                            zone: zoneId,
                            quest: questName
                        })
                    });
                } catch (e) { console.error(e); }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const userData = {
                    name: formData.get('name'),
                    grade: formData.get('grade'),
                    room: formData.get('room')
                };
                setUser(userData);
                localStorage.setItem('questUser', JSON.stringify(userData));
                setCurrentPage('home');
            };

            useEffect(() => {
                let watchId;
                if (activeZone && currentPage === 'zone') {
                    setGpsLoading(true);
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            const { latitude, longitude } = pos.coords;
                            const dist = calculateDistance(latitude, longitude, activeZone.lat, activeZone.lng);
                            setDistanceToTarget(dist);
                            setIsInsideZone(dist <= CONFIG.ALLOWED_RADIUS_METERS);
                            setGpsLoading(false);
                        },
                        (err) => { setGpsLoading(false); },
                        { enableHighAccuracy: true, maximumAge: 0 }
                    );
                }
                return () => navigator.geolocation.clearWatch(watchId);
            }, [activeZone, currentPage]);

            const calculateDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371e3;
                const φ1 = lat1 * Math.PI/180;
                const φ2 = lat2 * Math.PI/180;
                const Δφ = (lat2-lat1) * Math.PI/180;
                const Δλ = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            };

            const handleStartScan = (questIdx, questName) => {
                if (!isInsideZone) return;
                setScanning(true);
                setTimeout(() => {
                    const current = completedQuests[activeZone.id] || [];
                    if (!current.includes(questIdx) && current.length < 2) {
                        const updated = [...current, questIdx];
                        setCompletedQuests({ ...completedQuests, [activeZone.id]: updated });
                        saveProgressToCloud(activeZone.name, questName);
                    }
                    setScanning(false);
                }, 2000);
            };

            const triggerSuccessEffect = () => {
                setCurrentPage('success');
                const duration = 3000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fbbf24', '#f59e0b', '#b45309'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fbbf24', '#f59e0b', '#b45309'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            };

            const isZoneComplete = (id) => (completedQuests[id]?.length || 0) >= 2;
            const totalProgress = (Object.values(completedQuests).flat().length / 8) * 100;

            return (
                <div className="min-h-screen max-w-md mx-auto relative overflow-x-hidden">
                    {currentPage !== 'auth' && (
                        <nav className="p-4 flex justify-between items-center bg-[#0a0604]/90 border-b border-[#92400e] sticky top-0 z-50 backdrop-blur">
                            <h1 className="font-bold flex items-center text-amber-500 gold-glow">
                                <Icon name="compass" className="w-5 h-5 mr-2" /> ตำนาน ๔ แผ่นดิน
                            </h1>
                            <div className="bg-[#1f1209] border border-[#92400e] px-3 py-1 rounded-md text-xs font-bold text-amber-400">
                                พลัง: {Math.round(totalProgress)}%
                            </div>
                        </nav>
                    )}

                    <div className="p-4 pb-12">
                        {currentPage === 'auth' && (
                            <div className="py-10 animate-in fade-in zoom-in duration-700">
                                <div className="text-center mb-8">
                                    <div className="w-24 h-24 mx-auto mb-4 bg-[#1f1209] rounded-full border-2 border-amber-600 flex items-center justify-center animate-float shadow-[0_0_20px_rgba(217,119,6,0.5)]">
                                        <Icon name="scroll" className="w-12 h-12 text-amber-500" />
                                    </div>
                                    <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-600 drop-shadow-md">
                                        ลงนาม<br/>นักเดินทาง
                                    </h1>
                                </div>
                                <form onSubmit={handleLogin} className="ancient-border p-6 rounded-2xl space-y-5">
                                    <div>
                                        <label className="block text-xs text-amber-400/70 mb-1 font-bold">ชื่อ - นามสกุล</label>
                                        <input required name="name" type="text" placeholder="ด.ช. / ด.ญ." className="w-full bg-[#0a0604] border border-[#92400e] rounded-lg px-4 py-3 text-amber-200 focus:outline-none focus:border-amber-500 placeholder-amber-900/50" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-amber-400/70 mb-1 font-bold">ระดับชั้น</label>
                                            <select name="grade" className="w-full bg-[#0a0604] border border-[#92400e] rounded-lg px-4 py-3 text-amber-200 focus:outline-none">
                                                {['ม.1', 'ม.2', 'ม.3', 'ม.4', 'ม.5', 'ม.6'].map(g => <option key={g} value={g}>{g}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-amber-400/70 mb-1 font-bold">ห้อง</label>
                                            <select name="room" className="w-full bg-[#0a0604] border border-[#92400e] rounded-lg px-4 py-3 text-amber-200 focus:outline-none">
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 mt-4 bg-gradient-to-r from-amber-700 to-amber-500 text-[#0a0604] font-black text-lg rounded-xl shadow-[0_0_15px_rgba(217,119,6,0.6)] active:scale-95 transition-all">
                                        เข้าสู่ดินแดน
                                    </button>
                                </form>
                            </div>
                        )}

                        {currentPage === 'home' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="ancient-border p-4 rounded-xl flex items-center justify-between">
                                    <div>
                                        <p className="text-xs text-amber-500/70">นักเดินทาง</p>
                                        <h2 className="font-bold text-amber-200 text-lg">{user?.name}</h2>
                                    </div>
                                    <div className="text-right">
                                        <span className="bg-[#92400e] text-amber-100 px-3 py-1 rounded-md text-sm font-bold shadow-inner">
                                            {user?.grade}/{user?.room}
                                        </span>
                                    </div>
                                </div>

                                <button onClick={() => setCurrentPage('map')} className="w-full bg-gradient-to-r from-amber-600 to-amber-500 text-[#0a0604] font-black py-4 rounded-xl shadow-[0_0_20px_rgba(217,119,6,0.5)] active:scale-95 transition-all flex items-center justify-center">
                                    <Icon name="puzzle" className="w-5 h-5 mr-2" /> รวบรวมชิ้นส่วนจิ๊กซอว์
                                </button>

                                <div className="mt-8">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-extrabold text-amber-500 flex items-center gold-glow">
                                            <Icon name="sword" className="w-5 h-5 mr-2" /> ศึกแห่งเกียรติยศ (12 ห้อง)
                                        </h3>
                                        <span className="text-[10px] text-amber-700 font-bold flex items-center">
                                            <Icon name="refresh-cw" className="w-3 h-3 mr-1 animate-spin" /> อัปเดตสด
                                        </span>
                                    </div>
                                    
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                                        {leaderboard.map((lb, idx) => (
                                            <div key={idx} className="ancient-border bg-[#1f1209] p-2 rounded-lg flex items-center relative overflow-hidden">
                                                <div className="absolute left-0 top-0 bottom-0 bg-amber-900/30" style={{ width: `${Math.min(lb.score * 5, 100)}%` }}></div>
                                                <div className={`relative z-10 w-8 font-black ${idx < 3 ? 'text-amber-500' : 'text-amber-700'}`}>#{idx + 1}</div>
                                                <div className="relative z-10 flex-grow font-bold text-amber-200 text-sm">ห้อง {lb.class}</div>
                                                <div className="relative z-10 text-amber-500 font-black flex items-center text-sm">
                                                    {lb.score} <Icon name="flame" className="w-3 h-3 ml-1 text-orange-500" />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'map' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-2">
                                    <button onClick={() => setCurrentPage('home')} className="text-xs font-bold text-amber-600 flex items-center">
                                        <Icon name="chevron-left" className="w-4 h-4 mr-1" /> กลับที่พัก
                                    </button>
                                    <div className="text-xs text-amber-500">เลือกไขปริศนาฐานใดก่อนก็ได้</div>
                                </div>

                                {/* จิ๊กซอว์สุนทรภู่ (Jigsaw Puzzle Grid) */}
                                <div className="grid grid-cols-2 gap-1 p-2 bg-[#1f1209] rounded-2xl ancient-border aspect-square relative shadow-2xl">
                                    {ZONES_DATA.map((zone) => {
                                        const done = isZoneComplete(zone.id);
                                        const progressCount = completedQuests[zone.id]?.length || 0;
                                        return (
                                            <div 
                                                key={zone.id} 
                                                onClick={() => { setActiveZone(zone); setCurrentPage('zone'); }}
                                                className={`relative cursor-pointer overflow-hidden border border-[#92400e]/50 rounded-lg group puzzle-piece ${done ? 'puzzle-unlocked' : 'puzzle-locked hover:opacity-80'}`}
                                                style={{
                                                    backgroundImage: `url(${CONFIG.PUZZLE_IMAGE_URL})`,
                                                    backgroundPosition: zone.bgPos
                                                }}
                                            >
                                                {/* Overlay กรณีที่ยังไม่ผ่าน */}
                                                {!done && (
                                                    <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center backdrop-blur-[2px]">
                                                        <Icon name="help-circle" className="w-10 h-10 text-amber-600 mb-1" />
                                                        <span className="text-xs font-bold text-amber-500 bg-black/80 px-2 py-1 rounded">{zone.name}</span>
                                                        <div className="mt-2 text-[10px] bg-[#92400e] text-amber-100 px-2 rounded-full">
                                                            {progressCount}/2
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {/* ป้ายชื่อเมื่อผ่านแล้ว */}
                                                {done && (
                                                    <div className="absolute bottom-1 right-1 bg-black/70 px-2 py-0.5 rounded text-[10px] text-emerald-400 font-bold flex items-center">
                                                        <Icon name="check" className="w-3 h-3 mr-1" /> {zone.name}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="text-center text-amber-500/80 text-sm">
                                    <p>ตามหาชิ้นส่วนที่หายไปเพื่อเปิดเผยรูปภาพกวีเอก</p>
                                </div>

                                {totalProgress >= 100 && (
                                    <button onClick={triggerSuccessEffect} className="w-full mt-6 ancient-border bg-gradient-to-r from-amber-500 to-yellow-400 text-[#0a0604] font-black py-4 rounded-xl animate-pulse flex items-center justify-center">
                                        <Icon name="award" className="w-6 h-6 mr-2" /> ภาพสมบูรณ์ (รับรางวัล)
                                    </button>
                                )}
                            </div>
                        )}

                        {currentPage === 'zone' && activeZone && (
                            <div className="space-y-6 animate-in slide-in-from-right-4">
                                <button onClick={() => setCurrentPage('map')} className="text-xs font-bold text-amber-600 flex items-center mb-4">
                                    <Icon name="chevron-left" className="w-4 h-4 mr-1" /> กลับไปหน้าจิ๊กซอว์
                                </button>
                                
                                <div className={`ancient-border p-6 rounded-2xl relative overflow-hidden ${isInsideZone ? 'bg-[#152010]' : 'bg-[#1f1209]'}`}>
                                    <div className="absolute -right-4 -bottom-4 opacity-10 scale-[2]">
                                        <Icon name={activeZone.icon} className="text-amber-500" />
                                    </div>
                                    
                                    <div className="flex justify-between mb-4 relative z-10">
                                        <div className={`p-3 rounded-lg bg-gradient-to-br ${activeZone.color}`}>
                                            <Icon name={activeZone.icon} className="w-6 h-6 text-white" />
                                        </div>
                                        <span className={`px-3 py-1 rounded-md text-[10px] font-black uppercase border ${isInsideZone ? 'bg-emerald-900 border-emerald-500 text-emerald-300' : 'bg-[#0a0604] border-[#92400e] text-amber-600'}`}>
                                            {isInsideZone ? '📍 ถึงจุดหมาย' : '🚫 นอกอาณาเขต'}
                                        </span>
                                    </div>
                                    <h2 className="text-2xl font-black text-amber-200 mb-4 relative z-10">{activeZone.name}</h2>
                                    
                                    <div className="space-y-2 relative z-10">
                                        <div className="flex justify-between text-xs font-bold text-amber-500/80">
                                            <span>เข็มทิศนำทาง:</span>
                                            <span className={isInsideZone ? 'text-emerald-400' : 'text-amber-400'}>
                                                {gpsLoading ? 'กำลังเพ่งกระแสจิต...' : `${Math.round(distanceToTarget || 0)} เมตร`}
                                            </span>
                                        </div>
                                        <div className="h-1.5 bg-[#0a0604] rounded-full overflow-hidden border border-[#92400e]/50">
                                            <div className={`h-full transition-all duration-1000 ${isInsideZone ? 'bg-emerald-500 shadow-[0_0_10px_#10b981]' : 'bg-amber-600'}`} style={{ width: `${Math.max(0, 100 - (distanceToTarget || 0))}%` }}></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-sm font-black text-amber-600 flex items-center gold-glow">
                                        <Icon name="scroll-text" className="w-4 h-4 mr-2" /> เลือกทำ ๒ ภารกิจ (ปลดล็อกจิ๊กซอว์)
                                    </h3>
                                    {activeZone.quests.map((q, i) => {
                                        const done = completedQuests[activeZone.id]?.includes(i);
                                        const disabled = isZoneComplete(activeZone.id) && !done;
                                        return (
                                            <div key={i} className={`ancient-border p-4 rounded-xl flex justify-between items-center transition-all ${done ? 'bg-[#152010] border-emerald-800' : disabled ? 'opacity-40 grayscale bg-[#0a0604]' : 'bg-[#1f1209]'}`}>
                                                <span className={`text-sm font-bold ${done ? 'text-emerald-400' : 'text-amber-200'}`}>{q}</span>
                                                
                                                {!done && !disabled && (
                                                    <button onClick={() => handleStartScan(i, q)} disabled={!isInsideZone} className={`px-4 py-2 rounded-lg text-xs font-black transition-all ${isInsideZone ? 'bg-amber-500 text-[#0a0604] shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-[#0a0604] text-amber-700 border border-[#92400e]'}`}>
                                                        ร่ายคาถาสแกน
                                                    </button>
                                                )}
                                                {done && <Icon name="check-circle" className="text-emerald-500 w-6 h-6 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)]" />}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {currentPage === 'success' && (
                            <div className="text-center py-12 space-y-8 animate-in zoom-in duration-500">
                                <div className="relative inline-block">
                                    <div className="absolute inset-0 bg-yellow-500 blur-3xl opacity-50 rounded-full animate-pulse"></div>
                                    <div className="w-48 h-48 ancient-border rounded-full mx-auto relative z-10 overflow-hidden shadow-[0_0_30px_rgba(245,158,11,0.5)] border-4 border-amber-500">
                                        <img src={CONFIG.PUZZLE_IMAGE_URL} alt="Sunthorn Phu" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                                
                                <div>
                                    <h2 className="text-4xl font-black text-yellow-400 gold-glow mb-2">มหาชัยชนะ!</h2>
                                    <p className="text-amber-200/80 text-sm">ประกอบจิ๊กซอว์กวีเอกสมบูรณ์แบบ</p>
                                </div>

                                <div className="ancient-border bg-gradient-to-b from-[#1f1209] to-[#0a0604] p-8 rounded-2xl text-left shadow-[0_0_30px_rgba(245,158,11,0.2)] relative overflow-hidden">
                                    <div className="font-black text-xl text-yellow-500 mb-6 flex justify-between items-center border-b border-[#92400e] pb-4">
                                        <span>GOLDEN PASS</span>
                                        <Icon name="ticket" className="w-6 h-6" />
                                    </div>
                                    <div className="space-y-4 mb-8">
                                        <div><p className="text-[10px] text-amber-600 font-bold uppercase">นามผู้กล้า</p><p className="text-amber-200 font-bold">{user?.name}</p></div>
                                        <div className="flex justify-between">
                                            <div><p className="text-[10px] text-amber-600 font-bold uppercase">สังกัด</p><p className="text-amber-200 font-bold">{user?.grade}/{user?.room}</p></div>
                                            <div className="text-right"><p className="text-[10px] text-amber-600 font-bold uppercase">สิทธิ์ระดับ</p><p className="text-yellow-400 font-black">V.I.P</p></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-center border-t-2 border-dashed border-[#92400e] pt-6">
                                        <div className="w-32 h-32 bg-[#fde68a] p-2 rounded-xl flex items-center justify-center relative">
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=WINNER-${user?.name}`} alt="QR" className="w-full h-full mix-blend-multiply opacity-90" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {scanning && (
                        <div className="fixed inset-0 z-[100] bg-[#0a0604]/95 flex flex-col items-center justify-center p-10 backdrop-blur-sm">
                            <div className="w-64 h-64 border-4 border-amber-600 rounded-full relative overflow-hidden shadow-[0_0_30px_rgba(217,119,6,0.5)]">
                                <div className="absolute top-0 left-0 w-full h-2 bg-amber-400 scan-animation drop-shadow-[0_0_10px_#fbbf24]"></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <Icon name="eye" className="w-16 h-16 text-amber-600/50" />
                                </div>
                            </div>
                            <p className="text-amber-500 font-black mt-8 text-xl animate-pulse gold-glow">กำลังตรวจสอบอาคม...</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
